name: Validate Template

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate root template
        run: python scripts/validate_template.py --mode template --root .

      - name: Validate reference example
        run: python scripts/validate_template.py --mode instance --root examples/reference-product
